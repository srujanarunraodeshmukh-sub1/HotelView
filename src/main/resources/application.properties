spring.application.name=HotelView

# MongoDB connection (read from environment variable)
spring.data.mongodb.uri=${MONGO_DB_URI}

# JWT secret (read from environment variable)
jwt.secret=${JWT_SECRET}

# Server port
server.port=8080

spring.jackson.time-zone=Asia/Kolkata
spring.jackson.serialization.write-dates-as-timestamps=false

spring.profiles.active=dev

# ==========================================
# CACHE CONFIGURATION (RENDER TESTING TIER)
# ==========================================
spring.cache.type=caffeine
spring.cache.cache-names=menuCache,menuSummaryCache
spring.cache.caffeine.spec=maximumSize=10,expireAfterAccess=1h

